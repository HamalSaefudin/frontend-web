<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ekspedisi - Inventory</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
  }

  .container {
    padding: 20px;
  }

  /* HEADER */
  .header {
    margin-bottom: 20px;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .toolbar input,
  .toolbar select {
    padding: 6px;
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: left;
  }

  /* MODAL */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-content {
    width: 900px;
    background: white;
    padding: 15px;
  }

  /* FORM GRID (IMPORTANT) */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 15px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    font-size: 12px;
  }

  .form-group input {
    padding: 5px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 10px;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
  }

  .tab {
    padding: 5px 10px;
    cursor: pointer;
  }

  .tab.active {
    border-bottom: 2px solid black;
  }

  /* TABLE ACTION */
  .actions button {
    margin-right: 5px;
  }

  /* FOOTER */
  .modal-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>EKSPEDISI</h2>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <select>
      <option>Status</option>
    </select>
    <input type="text" placeholder="Search..." />
    <button>Cari</button>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>No FJ</th>
        <th>Nama Pembeli</th>
        <th>Varian</th>
        <th>Mesin</th>
        <th>Rangka</th>
        <th>Status</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>FJ-001</td>
        <td>John Doe</td>
        <td>VARIO 125</td>
        <td>123</td>
        <td>456</td>
        <td>DRAFT</td>
        <td>
          <button onclick="openModal()">Edit</button>
        </td>
      </tr>
    </tbody>
  </table>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <!-- HEADER -->
    <h3>EKSPEDISI</h3>

    <!-- FORM GRID -->
    <div class="form-grid">
      <div class="form-group"><label>Cabang</label><input disabled value="Jakarta" /></div>
      <div class="form-group"><label>Tipe Unit</label><input disabled /></div>
      <div class="form-group"><label>No FJ</label><input disabled /></div>
      <div class="form-group"><label>No PDI</label><input disabled /></div>

      <div class="form-group"><label>Warna Unit</label><input disabled /></div>
      <div class="form-group"><label>No Rangka</label><input disabled /></div>
      <div class="form-group"><label>No Ekspedisi</label><input disabled /></div>
      <div class="form-group"><label>No Mesin</label><input disabled /></div>

      <div class="form-group" style="grid-column: span 4;">
        <label>Nama Pembeli</label>
        <input disabled />
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active">KSU</div>
      <div class="tab">Hadiah</div>
      <div class="tab">Barang Lain</div>
      <div class="tab">Part</div>
      <div class="tab">Sopir</div>
      <div class="tab">Foto</div>
    </div>

    <!-- TABLE + ADD -->
    <button onclick="addRow()">+ Tambah</button>

    <table id="ksuTable">
      <thead>
        <tr>
          <th>No</th>
          <th>Kode KSU</th>
          <th>Nama KSU</th>
          <th>Jenis</th>
          <th>QR</th>
          <th>Scan</th>
          <th>Menyusul</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- FOOTER -->
    <div class="modal-footer">
      <button onclick="refresh()">Refresh</button>
      <div>
        <button>Cetak</button>
        <button>Proses</button>
      </div>
    </div>

    <button onclick="closeModal()">Close</button>

  </div>
</div>

<script>
  function openModal() {
    document.getElementById("modal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  function addRow() {
    const table = document.getElementById("ksuTable").querySelector("tbody");
    const rowCount = table.rows.length + 1;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${rowCount}</td>
      <td><input /></td>
      <td><input /></td>
      <td><input /></td>
      <td>-</td>
      <td><input type="checkbox" /></td>
      <td><input type="checkbox" /></td>
      <td><button onclick="deleteRow(this)">Delete</button></td>
    `;

    table.appendChild(row);
  }

  function deleteRow(btn) {
    btn.closest("tr").remove();
  }

  function refresh() {
    alert("Refresh clicked");
  }
</script>

</body>
</html>
