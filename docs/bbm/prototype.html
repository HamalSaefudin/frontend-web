<!DOCTYPE html>
<html>
<head>
  <title>BBM</title>
  <style>
    body { font-family: Arial; padding:20px; }
    .row { display:flex; gap:16px; margin-bottom:10px; }
    .col { flex:1; }
    input, select, textarea { width:100%; padding:6px; }
    table { width:100%; border-collapse:collapse; margin-top:10px;}
    th, td { border:1px solid #ccc; padding:6px; }
    .modal {
      position:fixed; top:10%; left:10%; width:80%;
      background:#fff; padding:20px; border:1px solid #ccc;
      display:none;
    }
  </style>
</head>

<body>

<h2>BBM - Belum Lengkap</h2>

<!-- FILTER -->
<div class="row">
  <div class="col"><input placeholder="Cabang"/></div>
  <div class="col"><input type="date"/></div>
  <div class="col"><input type="date"/></div>
  <button>Cari</button>
</div>

<button onclick="openModal()">Tambah</button>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>No</th>
      <th>Tanggal</th>
      <th>No BBM</th>
      <th>Bank</th>
      <th>Nilai</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody>
    <tr><td colspan="6">No data</td></tr>
  </tbody>
</table>

<!-- MODAL -->
<div class="modal" id="modal">

<h3>Detail BBM</h3>

<div class="row">
  <div class="col"><label>Tanggal BBM</label><input type="date"></div>
  <div class="col"><label>Tgl Ref 1</label><input type="date"></div>
  <div class="col"><label>Tgl Ref 2</label><input type="date"></div>
</div>

<div class="row">
  <div class="col"><label>No BBM</label><input></div>
  <div class="col">
    <label>No Dok Ref 1</label>
    <input>
  </div>
  <div class="col">
    <label>No Dok Ref 2</label>
    <div style="display:flex; gap:8px;">
      <input>
      <button onclick="openRef()">🔍</button>
    </div>
  </div>
</div>

<hr>

<div class="row">
  <div class="col"><label>Nama Bank</label><select></select></div>
  <div class="col"><label>Nama Rekening</label><select></select></div>
</div>

<div class="row">
  <div class="col"><label>Terima Dari</label><input></div>
  <div class="col"><label>Jenis Relasi</label><select></select></div>
</div>

<div class="row">
  <div class="col"><label>Nilai</label><input></div>
</div>

<div>
  <label>Terbilang</label>
  <textarea></textarea>
</div>

<div>
  <label>Guna Membayar</label>
  <textarea></textarea>
</div>

<div>
  <label>Keterangan</label>
  <textarea></textarea>
</div>

<hr>

<div class="row">
  <div class="col"><select></select></div>
  <div class="col"><select></select></div>
</div>

<div style="text-align:right;">
  <button>Preview</button>
  <button>Cetak</button>
  <button>Simpan</button>
</div>

</div>

<!-- MODAL REFERENSI -->
<div class="modal" id="ref">

<h3>Dokumen Referensi</h3>

<div class="row">
  <div class="col"><select><option>Faktur Jual</option></select></div>
  <div class="col"><input placeholder="Nama Pembeli"/></div>
  <button>Cari</button>
</div>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th>Tanggal</th>
      <th>No FJ</th>
      <th>Nama</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody>
    <tr><td colspan="5">No data</td></tr>
  </tbody>
</table>

</div>

<script>
function openModal() {
  document.getElementById('modal').style.display = 'block';
}

function openRef() {
  document.getElementById('ref').style.display = 'block';
}
</script>

</body>
</html>
